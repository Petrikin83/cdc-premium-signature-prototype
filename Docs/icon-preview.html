<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CDC Premium Signature Icon Preview</title>
  <style>
    body {
      margin: 40px;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
      background: #fff;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    p {
      color: #555;
      margin-bottom: 32px;
    }
    .section {
      margin-bottom: 36px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 28px;
      margin: 16px 0;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 220px;
    }
    .contact-row {
      border-top: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      padding: 22px 0;
      display: flex;
      align-items: center;
      gap: 34px;
      max-width: 900px;
    }
    .divider {
      height: 34px;
      width: 1px;
      background: #bbb;
    }
    .label {
      font-size: 14px;
      color: #777;
      margin-bottom: 6px;
    }
    .contact-text {
      font-size: 17px;
      color: #1d1d1f;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <h1>CDC Premium Signature Icon Preview</h1>
  <p>Prototype contact icons using CDC orange #F16623.</p>

  <div class="section">
    <div class="label">48px source size</div>
    <div class="row">
      <img src="../Assets/icon-phone.svg" width="48" height="48" alt="Phone">
      <img src="../Assets/icon-email.svg" width="48" height="48" alt="Email">
      <img src="../Assets/icon-web.svg" width="48" height="48" alt="Website">
    </div>
  </div>

  <div class="section">
    <div class="label">32px test size</div>
    <div class="row">
      <img src="../Assets/icon-phone.svg" width="32" height="32" alt="Phone">
      <img src="../Assets/icon-email.svg" width="32" height="32" alt="Email">
      <img src="../Assets/icon-web.svg" width="32" height="32" alt="Website">
    </div>
  </div>

  <div class="section">
    <div class="label">24px final email size</div>
    <div class="row">
      <img src="../Assets/icon-phone.svg" width="24" height="24" alt="Phone">
      <img src="../Assets/icon-email.svg" width="24" height="24" alt="Email">
      <img src="../Assets/icon-web.svg" width="24" height="24" alt="Website">
    </div>
  </div>

  <div class="section">
    <div class="label">Sample contact row</div>
    <div class="contact-row">
      <div class="item">
        <img src="../Assets/icon-phone.svg" width="34" height="34" alt="Phone">
        <span class="contact-text">+971 50 421 35 70</span>
      </div>
      <div class="divider"></div>
      <div class="item">
        <img src="../Assets/icon-email.svg" width="34" height="34" alt="Email">
        <span class="contact-text">asm@cdc.company</span>
      </div>
      <div class="divider"></div>
      <div class="item">
        <img src="../Assets/icon-web.svg" width="34" height="34" alt="Website">
        <span class="contact-text">cdc.company</span>
      </div>
    </div>
  </div>
</body>
</html>
